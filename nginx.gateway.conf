server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;
    set $frontend       http://frontend:80;
    set $frontend_admin http://frontend-admin:80;
    set $admin_api      http://admin:8001;

    # Admin API — strip /admin/api prefix before forwarding to admin backend
    location /admin/api/ {
        rewrite ^/admin/api/(.*)$ /$1 break;
        proxy_pass         $admin_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin frontend — strip /admin prefix before forwarding
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass         $frontend_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else — main frontend (nginx proxies backend routes internally)
    location / {
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
